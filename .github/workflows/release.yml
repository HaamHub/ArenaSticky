name: Package and Upload

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate CurseForge project id
        run: |
          if [ "${{ vars.CURSEFORGE_PROJECT_ID }}" = "" ]; then
            echo "Missing repository variable CURSEFORGE_PROJECT_ID."
            echo "Set it in GitHub: Settings -> Secrets and variables -> Actions -> Variables."
            exit 1
          fi

      - name: Inject CurseForge project id
        run: |
          sed -i "s/PROJECT_ID_PLACEHOLDER/${{ vars.CURSEFORGE_PROJECT_ID }}/g" .pkgmeta

      # -g wrath: WotLK Classic. Do not use -g 2.5.5 (packager maps 2.x to TBC, not WotLK).
      #    Patch (e.g. 2.5.5) on Curse comes from ## Interface: in the .toc (20505 = 2.5.5).
      # -n file:label — CurseForge file name = ArenaSticky-0.3.5 (## Title: + project-version from tag).
      - name: Package and publish to CurseForge
        uses: BigWigsMods/packager@v2
        with:
          args: -g wrath -n '{package-name}-{project-version}{nolib}{classic}:{package-name}-{project-version}{classic}{nolib}'
        env:
          CF_API_KEY: ${{ secrets.CF_API_TOKEN }}
