name: Package and Upload

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate CurseForge project id
        run: |
          if [ "${{ vars.CURSEFORGE_PROJECT_ID }}" = "" ]; then
            echo "Missing repository variable CURSEFORGE_PROJECT_ID."
            echo "Set it in GitHub: Settings -> Secrets and variables -> Actions -> Variables."
            exit 1
          fi

      - name: Inject CurseForge project id
        run: |
          sed -i "s/PROJECT_ID_PLACEHOLDER/${{ vars.CURSEFORGE_PROJECT_ID }}/g" .pkgmeta

      - name: Package and publish to CurseForge
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_TOKEN }}

      - name: Locate packaged zip
        id: locate_zip
        run: |
          ZIP_PATH="$(ls -1 .release/*.zip | head -n 1)"
          if [ -z "$ZIP_PATH" ]; then
            echo "No zip found in .release/"
            exit 1
          fi
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload zip to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CF_API_TOKEN }}
          project_id: ${{ vars.CURSEFORGE_PROJECT_ID }}
          game_endpoint: wow
          file_path: ${{ steps.locate_zip.outputs.zip_path }}
          release_type: beta
          display_name: ArenaSticky ${{ github.ref_name }}
